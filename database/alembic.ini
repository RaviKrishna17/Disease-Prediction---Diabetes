# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = %(here)s/migrations

prepend_sys_path = .

path_separator = os

# We load the URL dynamically in env.py, but keep a placeholder
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/diabetes_prediction

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[loggers]
keys = root,sqlalchemy,alembic

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
